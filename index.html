<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UAE Business Setup</title>

<style>
body {font-family: Arial; margin:0; background:#f4f6f9;}

.hero {
background:#0a2540;
color:white;
text-align:center;
padding:60px 20px;
}

.btn {
background:#00c853;
color:white;
padding:12px 20px;
border:none;
cursor:pointer;
}

.section {padding:40px; text-align:center;}

input {
width:80%;
padding:10px;
margin:10px;
}

</style>
</head>

<body>

<div class="hero">
<h1>Start Your UAE Business</h1>
<p>0% Tax | 100% Ownership</p>
</div>

<div class="section">
<h2>Get Free Consultation</h2>

<form>
<input type="text" placeholder="Your Name" required><br>
<input type="tel" placeholder="Phone Number" required><br>
<input type="email" placeholder="Email Address" required><br>

<button class="btn">Submit</button>
</form>

</div>

</body>
</html>
