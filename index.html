<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UAE Business Setup</title>

<!-- FACEBOOK PIXEL -->
<script>
!function(f,b,e,v,n,t,s)
{if(f.fbq)return;n=f.fbq=function(){n.callMethod?
n.callMethod.apply(n,arguments):n.queue.push(arguments)};
if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
n.queue=[];t=b.createElement(e);t.async=!0;
t.src=v;s=b.getElementsByTagName(e)[0];
s.parentNode.insertBefore(t,s)}(window, document,'script',
'https://connect.facebook.net/en_US/fbevents.js');

fbq('init', 'YOUR_PIXEL_ID');
fbq('track', 'PageView');
</script>

<style>
body{margin:0;font-family:Arial;background:#f4f6f9;}
.hero{
background:linear-gradient(135deg,#0a2540,#007bff);
color:white;text-align:center;padding:100px 20px;
}
.btn{
background:#00c853;color:white;padding:12px 20px;border:none;cursor:pointer;
}
.section{padding:50px 20px;text-align:center;}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;max-width:1100px;margin:auto;
}
.card{
background:white;padding:20px;border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

/* FORM */
.form-box{
background:white;padding:25px;border-radius:10px;
max-width:400px;margin:auto;
}
input{width:100%;padding:10px;margin:10px 0;}

/* WHATSAPP */
.whatsapp{
position:fixed;bottom:20px;right:20px;
background:#25D366;color:white;padding:15px;
border-radius:50%;text-decoration:none;font-size:20px;
}

/* CHATBOT */
.chatbot{
position:fixed;bottom:90px;right:20px;
background:white;width:300px;border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
display:none;
}
.chat-header{
background:#007bff;color:white;padding:10px;
border-radius:10px 10px 0 0;
}
.chat-body{padding:10px;font-size:14px;}
.chat-btn{
position:fixed;bottom:90px;right:20px;
background:#007bff;color:white;padding:10px 15px;
border-radius:20px;cursor:pointer;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
<h1>Start Your UAE Business Today</h1>
<p>0% Tax | Full Ownership | Fast Setup</p>
<button class="btn" onclick="scrollToForm()">Apply Now</button>
</div>

<!-- SERVICES -->
<div class="section">
<h2>Our Services</h2>
<div class="grid">
<div class="card">Freezone License</div>
<div class="card">Visa Services</div>
<div class="card">Bank Account</div>
<div class="card">Business Consulting</div>
</div>
</div>

<!-- FORM -->
<div class="section" id="form">
<h2>Get Free Consultation</h2>
<div class="form-box">

<form id="leadForm">
<input type="text" id="name" placeholder="Name" required>
<input type="tel" id="phone" placeholder="Phone" required>
<input type="email" id="email" placeholder="Email" required>
<button class="btn" type="submit">Submit</button>
</form>

</div>
</div>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/971XXXXXXXXX">💬</a>

<!-- CHATBOT -->
<div class="chat-btn" onclick="toggleChat()">Chat</div>

<div class="chatbot" id="chatbox">
<div class="chat-header">Chat Support</div>
<div class="chat-body">
<p>Hi 👋 Want UAE business setup?</p>
<button onclick="sendWhatsApp()">Yes</button>
</div>
</div>

<script>
function scrollToForm(){
document.getElementById('form').scrollIntoView({behavior:'smooth'});
}

function toggleChat(){
let box=document.getElementById("chatbox");
box.style.display=box.style.display==="block"?"none":"block";
}

function sendWhatsApp(){
window.open("https://wa.me/971XXXXXXXXX");
}

// FORM SUBMIT
document.getElementById("leadForm").addEventListener("submit", function(e){
e.preventDefault();

let data={
name:document.getElementById("name").value,
phone:document.getElementById("phone").value,
email:document.getElementById("email").value
};

// GOOGLE SHEET
fetch("YOUR_GOOGLE_SCRIPT_URL",{
method:"POST",
body:JSON.stringify(data)
})
.then(res=>{
alert("Submitted Successfully!");
fbq('track','Lead');

// AUTO WHATSAPP
window.open("https://wa.me/971XXXXXXXXX?text=New Lead: "+data.name+" "+data.phone);
});
});
</script>

</body>
</html>
